<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop" onclick="closeFromOutside(event)">
        
        <div class="folder draggable" onclick="toggleProject('tipo', this)">
            <div class="icon-img"></div>
            <span class="label">Tipografía</span>
        </div>

        <div class="folder draggable" onclick="toggleProject('branding', this)">
            <div class="icon-img"></div>
            <span class="label">Branding</span>
        </div>

        <div class="folder draggable" onclick="toggleProject('editorial', this)">
            <div class="icon-img"></div>
            <span class="label">Editorial</span>
        </div>

        <div class="folder draggable" onclick="toggleProject('packaging', this)">
            <div class="icon-img"></div>
            <span class="label">Packaging</span>
        </div>

        <div class="app-icon draggable" onclick="openAbout(event)">
            <div class="app-visual">👤</div>
            <span class="label">Sobre Mí</span>
        </div>

        <div id="floating-gallery"></div>

        <div id="about-window" class="aero-window draggable" style="display:none;" onclick="event.stopPropagation()">
            <div class="window-header">
                <div class="traffic-lights">
                    <span class="light close" onclick="closeAbout()"></span>
                    <span class="light minimize"></span>
                    <span class="light maximize"></span>
                </div>
                <span class="window-title">Biografía.exe</span>
            </div>
            <div class="window-content">
                <div class="bio-layout">
                    <img src="https://picsum.photos/400/400" class="bio-photo">
                    <div class="bio-text">
                        <h2>¡Hola! Soy Tu Nombre</h2>
                        <p>Diseñador gráfico. Este es mi escritorio interactivo.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="project-fullscreen" style="display:none;" onclick="closeFullscreen()">
        <button class="close-fs">✕</button>
        <div id="project-content"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
