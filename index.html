<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Frutiger Aero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop">
        <div class="folder draggable" id="f-tipo" onclick="toggleProject('tipo', this)">
            <div class="icon-container"><div class="icon-img"></div></div>
            <span class="label">Tipografía</span>
        </div>

        <div class="folder draggable" id="f-branding" onclick="toggleProject('branding', this)">
            <div class="icon-container"><div class="icon-img"></div></div>
            <span class="label">Branding</span>
        </div>

        <div class="folder draggable" id="f-editorial" onclick="toggleProject('editorial', this)">
            <div class="icon-container"><div class="icon-img"></div></div>
            <span class="label">Editorial</span>
        </div>

        <div class="folder draggable" id="f-packaging" onclick="toggleProject('packaging', this)">
            <div class="icon-container"><div class="icon-img"></div></div>
            <span class="label">Packaging</span>
        </div>

        <div class="folder draggable" id="f-social" onclick="toggleProject('social', this)">
            <div class="icon-container"><div class="icon-img"></div></div>
            <span class="label">Social Media</span>
        </div>

        <div id="floating-gallery"></div>
    </div>

    <div id="project-fullscreen" style="display:none;" onclick="closeFullscreen()">
        <button class="close-fs">✕</button>
        <div id="project-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
