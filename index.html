<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop">
        <div class="folder draggable" onclick="openProject('tipo')">
            <div class="icon"></div>
            <span class="label">Tipografía_Book</span>
        </div>

        <div class="folder draggable" onclick="openProject('branding')" style="left: 180px;">
            <div class="icon"></div>
            <span class="label">Proyecto_Branding</span>
        </div>

        <div id="floating-gallery"></div>
    </div>

    <div id="project-fullscreen" style="display:none;">
        <button class="close-fs" onclick="closeFullscreen()">✕ Cerrar</button>
        <div id="project-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
